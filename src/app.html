<!doctype html>
<html lang="en" class="%sveltekit.theme%">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" id="theme-color" />
    <title>Kagi News</title>
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    <!-- Prevent flash of wrong theme - minimal script that only handles dark mode detection -->
    <script>
      (() => {
        try {
          if (typeof window === "undefined") return;

          let storedTheme = null;
          try {
            storedTheme = localStorage.getItem("theme");
          } catch (storageError) {
            console.warn("localStorage not accessible:", storageError);
          }

          const CTP_DARK = ["ctp-frappe", "ctp-macchiato", "ctp-mocha"];
          const CTP_META = {
            "ctp-latte": "#eff1f5",
            "ctp-frappe": "#303446",
            "ctp-macchiato": "#24273a",
            "ctp-mocha": "#1e1e2e",
          };

          let darkModePreferred = false;
          let ctpFlavor = null;

          if (storedTheme && storedTheme.startsWith("ctp-")) {
            ctpFlavor = storedTheme;
            darkModePreferred = CTP_DARK.includes(storedTheme);
          } else if (storedTheme === "dark") {
            darkModePreferred = true;
          } else if (storedTheme === "system" || !storedTheme) {
            darkModePreferred = window.matchMedia(
              "(prefers-color-scheme: dark)"
            ).matches;
          }

          if (darkModePreferred) {
            document.documentElement.classList.add("dark");
          }
          if (ctpFlavor) {
            document.documentElement.classList.add(ctpFlavor);
          }

          const themeColorMeta = document.getElementById("theme-color");
          if (themeColorMeta) {
            const color =
              CTP_META[ctpFlavor] ??
              (darkModePreferred ? "#1f2937" : "#ffffff");
            themeColorMeta.setAttribute("content", color);
          }
        } catch (e) {
          console.error("Theme detection error:", e);
        }
      })();
    </script>

    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="dark:bg-dark-bg dark:text-dark-text min-h-dvh bg-white text-black"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
